<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="contact.css">
        <link rel="stylesheet" href="style.css">
        <title>Contact Us - Amongst the Stars</title>
    </head>

    <body>

        <div class="NavBar">
            <nav>
                <h3>Amongst the stars</h3>
                <a href="home.html">Home</a>
                <a href="future.html">Future</a>
                <a href="history.html">History</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>

        <div class = "contact-container">
            <h1>Contact Us</h1>
            <p class="intro-text">Get in touch with us! Fill out the form below and we'll get back to you as soon as possible.</p>
            
            <form class="form" id="contactForm" onsubmit="handleSubmit(event)">
                <div class="name">
                    <label for="nameInput">Name</label>
                    <input 
                        id="nameInput"
                        type="text" 
                        name="name"
                        placeholder="Enter your full name"
                        maxlength="100"
                        pattern="[A-Za-z\s']+"
                        required
                        title="Name can only contain letters, spaces, and apostrophes">
                </div>

                <div class="email">
                    <label for="emailInput">Email</label>
                    <input 
                        id="emailInput"
                        type="email" 
                        name="email"
                        placeholder="Enter your email address"
                        maxlength="255"
                        required
                        title="Please enter a valid email address">
                </div>

                <div class="message">
                    <label for="messageInput">Message</label>
                    <textarea 
                        id="messageInput"
                        name="message"
                        placeholder="Type your message here"
                        maxlength="1000"
                        rows="5"
                        required
                        title="Message can be up to 1000 characters"></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <div class="map-container">
                <h2>Our Location</h2>
                <p>Visit the University of Exeter:</p>
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2498.5789522547486!2d-3.533647!3d50.7372!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x486da964757ceb53%3A0x6bfc7e10bf88f0e9!2sUniversity%20of%20Exeter!5e0!3m2!1sen!2suk!4v1629819876543" 
                    width="100%" 
                    height="400">
                </iframe>
            </div>
        </div>

        <div class = "Footer">
            <nav>
                <h3>Space is big</h3>
                <a href="/home.html">Home</a>
                <a href="/future.html">Future</a>
                <a href="/history.html">History</a>
                <a href="/contact.html">Contact</a>
            </nav>
        </div>

        <script>
            function handleSubmit(event) {
                alert('Thank you for your message! We will get back to you soon.');
                form.reset();
            }
        </script>

    </body>
</html>
